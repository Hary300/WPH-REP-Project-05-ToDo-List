<!doctype html>
<html lang="en">

    <link rel="stylesheet" href="./src/output.css" />

      <!-- === 1. HEADER === -->
      <header>
        <div>
          <h1>Hary300 Todo</h1>
          <p id="date">Tuesday, 26 October 2023</p>
        </div>
        <p>5 Task Left</p>
      </header>

      <!-- === 2. MAIN === -->
      <main>
        <!-- 2.1 Form -->
        <form>
          <input type="text" placeholder="Add new task..." />

            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.5v15m7.5-7.5h-15"
              />
            </svg>
            Add Task
          </button>
        </form>

        <!-- 2.2 Todo List -->
        <section id="todo-list">

            <!--  -->
            <li>
              <div>
                <div class=""></div>

              </div>

                  stroke="currentColor"
